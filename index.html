<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {box-sizing: border-box}

/* Set height of body and the document to 100% */
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial;
  background-color: #282a36;
  padding: 0px 0px;
}

/* Style tab links */
.tablink {
  background-color: #282a36;
  color: white;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 10px 20px;
  font-family: Arial;
  font-size: 20px;
  width: 25%;
  text-align: left;
} 

/*Style home click */
.homeclick{
     background-color: #282a36;
     color: white;
     float: left;
     text-align: left;
     border: none;
     outline: none;
     cursor: pointer;
     font-family: Arial;
     font-size: 24pt;
     width: 60%;
     height: 40px;
     margin-left: 0px;
 }

.blankrow{
     background-color: #282a36;
     width: 100%;
     height: 0px;
     border: none;
 }

 
.tablink:hover {
  background-color: #181a21;
}

/* Style the tab content (and add height:100% for full page content) */
.tabcontent {
  color: white;
  display: none;
  padding: 40px 20px;
  height: 100%;
}


/* Style titlebar */
.titlebar{
    color: white;
    padding: 4px 16px;
}

h3 span {font-size: 16px; color: #ffffff}

h3 {font-size: 18px; color: #50fa7b}

div.solid {border-style: solid; border-color: #ff5555;
           margin-left: 30px; margin-right: 30px;
           margin-bottom: 30px;
           padding-left: 10px; padding-right: 10px}

OBJECT {
    width: 100%; height: 100%;
    padding-left: 10px; padding-right: 10px;
}

</style>
</head>
<body>

  <div id="Titlebar" class="titlebar">
    <button class="homeclick" onclick="openPage('Home', this)">Calder Sheagren</button>
    <button class="blankrow"></button>
  </div>



<button class="tablink" onclick="openPage('Home', this)" id="defaultOpen"> Home</button>
<button class="tablink" onclick="openPage('About', this)">About</button>
<button class="tablink" onclick="openPage('News', this)"  >News</button>
<button class="tablink" onclick="openPage('Contact', this)">Contact</button>

<div id="Home" class="tabcontent">
  <h2 style="color:#bd93f9">Home</h2>
  <OBJECT data="home.html"></OBJECT>
</div>

<div id="About" class="tabcontent">
  <h2 style="color:#ff79c6">About</h2>
  <OBJECT data="about.html"></OBJECT>
</div>

<div id="News" class="tabcontent">
  <h2 style="color:#ff5555">News</h2>
  <OBJECT data="news.html"></OBJECT>
</div>

<div id="Contact" class="tabcontent">
  <h2 style="color:#50fa7b">Contact</h2>
  <OBJECT data="contact.html"</OBJECT>
</div>


<script>
function openPage(pageName,elmnt,color) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablink");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].style.backgroundColor = "";
  }
  document.getElementById(pageName).style.display = "block";
  elmnt.style.backgroundColor = color;
}

// Get the element with id="defaultOpen" and click on it
document.getElementById("defaultOpen").click();

</script>


</body>
</html>
